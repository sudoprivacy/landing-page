<!-- ============================================================
     SudoPrivacy Landing Page — Design System Head Fragment
     T0: Design Tokens + Tailwind Config + Global Styles
     Usage: Copy everything inside <head> into your page's <head>
     ============================================================ -->

<!-- 1. Meta charset + viewport -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- SEO meta tags (customize per page) -->
<meta name="description" content="SudoPrivacy — 企业级数据安全与隐私保护平台" />
<meta name="keywords" content="数据安全, 隐私保护, 企业安全, SudoPrivacy" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="SudoPrivacy" />
<meta name="theme-color" content="#FAF9F0" />

<!-- 2. Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
  rel="stylesheet"
/>

<!-- 3. Tailwind CDN + config -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          page: '#FAF9F0',
          dark: '#1a1a1a',
          'dark-footer': '#111111',
          accent: '#F59E0B',
          'accent-hover': '#D97706',
          'accent-light': '#FEF3C7',
          teal: '#0D9488',
          'teal-hover': '#0F766E',
          border: '#E5E7EB',
        },
        fontFamily: {
          heading: ['"Noto Sans SC"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
          body: ['"Noto Sans SC"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
          mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
        },
        maxWidth: {
          content: '1200px',
        },
      },
    },
  }
</script>

<!-- 4. CSS Variables + Global Styles + Animations -->
<style>
  /* ── Design Tokens ──────────────────────────────────────── */
  :root {
    /* Backgrounds */
    --bg-page: #faf9f0;
    --bg-card: #ffffff;
    --bg-dark: #1a1a1a;
    --bg-footer: #111111;

    /* Text */
    --text-primary: #1a1a1a;
    --text-secondary: #6b7280;
    --text-on-dark: #ffffff;
    --text-on-dark-muted: rgba(255, 255, 255, 0.7);

    /* Brand */
    --accent: #f59e0b;
    --accent-hover: #d97706;
    --accent-light: #fef3c7;

    /* Teal — secondary accent */
    --teal: #0d9488;
    --teal-hover: #0f766e;

    /* Borders */
    --border: #e5e7eb;

    /* Typography */
    --font-heading: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    --font-body: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    --font-mono: "JetBrains Mono", "Fira Code", monospace;

    /* Spacing */
    --max-width: 1200px;
    --nav-height: 64px;
  }

  /* ── Global Reset & Base ────────────────────────────────── */
  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }

  body {
    margin: 0;
    background-color: var(--bg-page);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-weight: 400;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Headings ───────────────────────────────────────────── */
  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-heading);
    font-weight: 700;
    line-height: 1.25;
    color: var(--text-primary);
    margin-top: 0;
    margin-bottom: 0.5em;
  }

  h1 { font-weight: 900; }
  h2 { font-weight: 700; }
  h3 { font-weight: 700; }

  /* ── Links ──────────────────────────────────────────────── */
  a {
    color: var(--teal);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  a:hover {
    color: var(--teal-hover);
  }

  /* ── Images ─────────────────────────────────────────────── */
  img,
  svg,
  video {
    display: block;
    max-width: 100%;
  }

  /* ── Code / Mono ────────────────────────────────────────── */
  code,
  pre,
  kbd,
  samp {
    font-family: var(--font-mono);
    font-size: 0.875em;
  }

  /* ── Scroll Animations ──────────────────────────────────── */
  .fade-up {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Reduced Motion ─────────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    html {
      scroll-behavior: auto;
    }

    .fade-up {
      opacity: 1;
      transform: none;
      transition: none;
    }

    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
